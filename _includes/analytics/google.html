<!-- MIOOOXXX Global site tag (gtag.js) - Google Analytics -->
<script defer src="https://www.googletagmanager.com/gtag/js?id={{ site.analytics.google.id }}"></script>
<script> 
  // Create consent update function - available globally
  function consentGrantedAdStorage() {
    if (typeof gtag !== 'undefined') {
      gtag('consent', 'update', {
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'granted'
      });
    }
  }
  
  window.addEventListener('DOMContentLoaded', () => {
    if (typeof gtag !== 'undefined') {
      // Set default consent to 'denied' as a placeholder
      // Determine actual values based on your own requirements
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
      });
      
      gtag('js', new Date());
      gtag('config', '{{ site.analytics.google.id }}');
    }
  });

</script>
