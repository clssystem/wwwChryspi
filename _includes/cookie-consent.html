<div id="cookie-banner" class="dynamic-banner">
  <div class="banner-content">
    <p>Utilizamos cookies para analizar el tráfico y mejorar tu experiencia. 🍪</p>
    <div class="banner-buttons">
      <button onclick="acceptCookies()" class="btn btn-primary btn-sm">Aceptar</button>
      <button onclick="rejectCookies()" class="btn btn-outline-secondary btn-sm">Rechazar</button>
      <a href="/privacidad" class="btn btn-link btn-sm text-muted">+ Info</a>
    </div>
  </div>
</div>

<style>
  #cookie-banner {
    display: none;
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 95%;
    max-width: 500px;
    background-color: var(--main-bg); 
    color: var(--text-color);
    border: 1px solid var(--main-border-color);
    padding: 1.5rem;
    border-radius: 1rem;
    z-index: 1050;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  .banner-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 12px;
  }

  .banner-content p {
    margin: 0;
    font-size: 0.95rem;
    line-height: 1.4;
  }

  .banner-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Ajuste de botones para que se sientan integrados en Chirpy */
  .banner-buttons .btn {
    border-radius: 20px;
    padding: 4px 18px;
    font-size: 0.85rem;
  }
</style>

<script>
  const GA_ID = '{{ site.google_analytics.id }}';
    // alert('Cargando Google Analytics con ID: ' + GA_ID); // Debug: Verificar el ID antes de cargar
  function loadGA() {


    if (!GA_ID || GA_ID === "") return;
    
    var script = document.createElement('script');
    script.async = true;
    script.src = 'https://googletagmanager.com/gtag/js?id=' + GA_ID;
    document.head.appendChild(script);

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', GA_ID);
  }

  // Lógica de carga según estado previo
  const cookieStatus = localStorage.getItem('cookies-accepted');

  if (cookieStatus === 'true') {
    loadGA();
  } else if (cookieStatus === null) {
    document.getElementById('cookie-banner').style.display = 'block';
  }

  function acceptCookies() {
    localStorage.setItem('cookies-accepted', 'true');
    document.getElementById('cookie-banner').style.display = 'none';
    loadGA();
  }

  function rejectCookies() {
    localStorage.setItem('cookies-accepted', 'false');
    document.getElementById('cookie-banner').style.display = 'none';
    // No cargamos GA
  }
</script>
