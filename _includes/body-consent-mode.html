<!-- Consent Mode v2 Default Settings -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
    gtag('config', '{{ site.google_analytics.idGA }}');
  
  var savedConsent = localStorage.getItem('cookie-consent') === 'granted' ? 'granted' : 'denied';

  gtag('consent', 'default', {
    'ad_storage': 'denied',
    'ad_user_data': 'denied',
    'ad_personalization': 'denied',
    'analytics_storage': savedConsent,
    'wait_for_update': 500
  });
</script>
